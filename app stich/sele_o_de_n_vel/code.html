<!DOCTYPE html>

<html lang="pt-BR"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-secondary": "#ffffff",
                    "on-primary": "#ffffff",
                    "inverse-primary": "#a8c8ff",
                    "on-secondary-fixed": "#002116",
                    "primary": "#002b57",
                    "secondary-container": "#93f6ce",
                    "surface-dim": "#d6dae3",
                    "surface-container-low": "#f0f4fd",
                    "on-background": "#171c22",
                    "on-secondary-container": "#007255",
                    "surface": "#f8f9ff",
                    "on-primary-fixed": "#001b3c",
                    "background": "#f8f9ff",
                    "secondary-fixed": "#93f6ce",
                    "tertiary": "#272b2d",
                    "tertiary-fixed": "#e0e3e5",
                    "surface-variant": "#dee3eb",
                    "primary-container": "#1a4173",
                    "on-tertiary-fixed-variant": "#434749",
                    "on-error-container": "#93000a",
                    "surface-tint": "#3c5f93",
                    "on-error": "#ffffff",
                    "on-primary-container": "#8caee7",
                    "secondary-fixed-dim": "#77d9b3",
                    "on-surface": "#171c22",
                    "on-surface-variant": "#43474f",
                    "inverse-surface": "#2c3137",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "surface-bright": "#f8f9ff",
                    "primary-fixed-dim": "#a8c8ff",
                    "surface-container-highest": "#dee3eb",
                    "tertiary-container": "#3d4143",
                    "on-primary-fixed-variant": "#224779",
                    "secondary": "#006c50",
                    "on-tertiary-fixed": "#181c1e",
                    "error-container": "#ffdad6",
                    "outline-variant": "#c3c6d0",
                    "primary-fixed": "#d5e3ff",
                    "surface-container-high": "#e4e8f1",
                    "tertiary-fixed-dim": "#c4c7c9",
                    "on-secondary-fixed-variant": "#00513c",
                    "outline": "#737780",
                    "on-tertiary-container": "#a9adaf",
                    "on-tertiary": "#ffffff",
                    "inverse-on-surface": "#edf1fa",
                    "surface-container": "#eaeef7"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "1.5rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-surface font-body min-h-screen flex flex-col">
<!-- TopAppBar Section -->
<header class="bg-slate-50/80 backdrop-blur-xl sticky top-0 z-50 flex justify-between items-center w-full px-6 py-4">
<div class="flex items-center gap-4">
<span class="material-symbols-outlined text-primary">menu</span>
<h1 class="font-headline font-extrabold text-primary tracking-tighter text-xl">Foco no Concurso</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-highest flex items-center justify-center overflow-hidden">
<img alt="User profile" class="w-full h-full object-cover" data-alt="Close-up portrait of a professional young man with a friendly expression in a brightly lit modern office environment" src="https://lh3.googleusercontent.com/aida-public/AB6AXuABMitFCEJBjkhqejn86qc9OottVbDjQQPhtuB5FkJqy8qf5X3nu9edCwcA3n-TjEGOAD-A2zjU-sAuWcoJfrHLOoUvereYSKDe3CAFaB3qQEGZpHwn_VrqNKELZsj6yvG3E-6PGinneE7b3E_y8juu7LHOakConYUeFV9hYRsO4eD3n1zF4uUOpAzVVYcyv4lq9gME-NVGQn2xhPvNUmr1jgWh_MfWXxPoHzTBoVcKSOQ5RkvG2M7TV_LLS_Fw3QiuJl02QnLYH40"/>
</div>
</header>
<main class="flex-grow container mx-auto px-6 py-12 max-w-2xl flex flex-col">
<!-- Hero Section -->
<div class="mb-12">
<span class="inline-block px-3 py-1 mb-4 rounded-full bg-secondary-fixed text-on-secondary-fixed text-xs font-bold tracking-widest uppercase">
                Bem-vindo
            </span>
<h2 class="font-headline text-4xl md:text-5xl font-extrabold text-primary leading-tight tracking-tight mb-4">
                Qual o seu objetivo?
            </h2>
<p class="text-on-surface-variant text-lg leading-relaxed">
                Personalize sua jornada de estudos selecionando o nível de escolaridade do concurso que deseja conquistar.
            </p>
</div>
<!-- Bento Grid Options -->
<div class="grid grid-cols-1 gap-6 mb-12">
<!-- Nível Fundamental -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container hover:-translate-y-1">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-2">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-2 transition-colors group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl">school</span>
</div>
<h3 class="font-headline text-xl font-bold text-primary">Nível Fundamental</h3>
<p class="text-on-surface-variant text-sm">Cargos operacionais, auxiliares e de suporte primário.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<!-- Visual Accent -->
<div class="absolute bottom-0 right-0 w-24 h-24 bg-primary/5 rounded-tl-full translate-x-8 translate-y-8 group-hover:bg-primary/10 transition-colors"></div>
</button>
<!-- Nível Médio -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 border-2 border-primary/5 hover:border-primary/20 hover:bg-surface-container-low hover:-translate-y-1">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-2">
<div class="w-12 h-12 rounded-lg bg-primary-fixed flex items-center justify-center text-primary mb-2">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">menu_book</span>
</div>
<h3 class="font-headline text-xl font-bold text-primary">Nível Médio</h3>
<p class="text-on-surface-variant text-sm">Cargos técnicos, administrativos e segurança pública.</p>
</div>
<span class="material-symbols-outlined text-primary">check_circle</span>
</div>
<div class="absolute bottom-0 right-0 w-24 h-24 bg-primary/10 rounded-tl-full translate-x-8 translate-y-8"></div>
</button>
<!-- Nível Superior -->
<button class="group relative overflow-hidden bg-surface-container-lowest rounded-xl p-6 text-left transition-all duration-300 hover:bg-surface-container hover:-translate-y-1">
<div class="flex items-start justify-between">
<div class="flex flex-col gap-2">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center text-primary mb-2 transition-colors group-hover:bg-primary-fixed">
<span class="material-symbols-outlined text-2xl">account_balance</span>
</div>
<h3 class="font-headline text-xl font-bold text-primary">Nível Superior</h3>
<p class="text-on-surface-variant text-sm">Analistas, gestores, fiscais e carreiras jurídicas.</p>
</div>
<span class="material-symbols-outlined text-outline-variant group-hover:text-primary transition-colors">arrow_forward</span>
</div>
<div class="absolute bottom-0 right-0 w-24 h-24 bg-primary/5 rounded-tl-full translate-x-8 translate-y-8 group-hover:bg-primary/10 transition-colors"></div>
</button>
</div>
<!-- Progress Indicator (Editorial Style) -->
<div class="mt-auto pt-8 flex items-center justify-between">
<div class="flex gap-2">
<div class="w-8 h-1.5 rounded-full bg-primary"></div>
<div class="w-2 h-1.5 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-1.5 rounded-full bg-surface-container-highest"></div>
</div>
<span class="text-xs font-bold text-outline uppercase tracking-widest">Passo 1 de 3</span>
</div>
</main>
<!-- Footer Action -->
<footer class="p-6 md:pb-12 max-w-2xl mx-auto w-full">
<button class="w-full py-5 bg-gradient-to-r from-primary to-primary-container text-white font-headline font-bold text-lg rounded-xl shadow-lg transition-transform active:scale-[0.98] flex items-center justify-center gap-3">
            Começar a Estudar
            <span class="material-symbols-outlined">trending_flat</span>
</button>
<p class="text-center text-on-surface-variant text-xs mt-6 px-4">
            Ao continuar, você concorda com nossos Termos de Uso e Política de Privacidade.
        </p>
</footer>
<!-- Decorative Elements (Asymmetric) -->
<div class="fixed top-24 -right-12 w-64 h-64 bg-secondary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-0 -left-12 w-96 h-96 bg-primary/5 rounded-full blur-3xl -z-10"></div>
</body></html>
